<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0f0;color:#111;font-size:14px}
input,select,button,textarea{font-family:inherit;font-size:13px}

button{cursor:pointer}
.app{min-height:100vh;background:#f0f0f0}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}

.nav{background:#fff;border-bottom:1px solid #e0e0e0;display:flex;padding:0 24px;overflow-x:auto}
.nav-btn{padding:11px 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:#888;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer}

.body{display:flex;max-width:1400px;margin:0 auto}
.main{flex:1;min-width:0;padding:24px}
.ai-panel{width:320px;flex-shrink:0;background:#fff;border-left:1px solid #e0e0e0;height:calc(100vh - 96px);position:sticky;top:96px;display:flex;flex-direction:column}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:18px 20px;margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#f5f5f5;border-radius:8px;padding:14px 16px}
.kpi-label{font-size:11px;color:#888;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:600}
.kpi-sub{font-size:10px;color:#aaa;margin-top:3px}
.sec-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:block}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block}
.badge-paid{background:#EAF3DE;color:#27500A}
.badge-partial{background:#FAEEDA;color:#633806}
.badge-unpaid{background:#FCEBEB;color:#791F1F}
.badge-production{background:#EAF3DE;color:#27500A}
.badge-transfer{background:#E6F1FB;color:#0C447C}
.badge-dispatch{background:#FAEEDA;color:#633806}

.btn-primary{padding:9px 20px;border-radius:7px;background:#378ADD;color:#fff;border:none;font-weight:600}

.btn-secondary{padding:6px 14px;border-radius:6px;background:#f5f5f5;color:#555;border:1px solid #ddd;font-weight:500}

.btn-active{color:#378ADD!important;border-color:#378ADD!important}
.btn-green{background:#3B6D11;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-weight:600}

.ovx{overflow-x:auto}

.mb16{margin-bottom:16px}

.color-green{color:#3B6D11}
.color-blue{color:#378ADD}
.fw6{font-weight:600}
.fs12{font-size:12px}
.fs11{font-size:11px}

.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-row input{max-width:260px}
.move-type-btn{padding:7px 12px;border-radius:7px;border:1px solid #ddd;background:#f5f5f5;color:#555;font-weight:500;cursor:pointer;font-size:11px}

.move-type-btn.sel-trans{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.move-type-btn.sel-disp{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.move-type-btn.sel-open{background:#EEEDFE;color:#3C3489;border-color:#7F77DD}
.move-type-btn.sel-adj{background:#F1EFE8;color:#444441;border-color:#888780}
.stock-flow{display:grid;grid-template-columns:1fr 60px 1fr 60px 1fr;gap:0;align-items:center;margin-bottom:20px}
.flow-box{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px;text-align:center}
.flow-arrow{text-align:center;font-size:22px;color:#888}
.flow-label{font-size:11px;color:#888;margin-bottom:4px}
.flow-val{font-size:22px;font-weight:700;color:#111}
.flow-sub{font-size:10px;color:#aaa;margin-top:2px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0f0}
.login-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:40px;width:100%;max-width:360px;text-align:center}
.login-icon{width:52px;height:52px;border-radius:12px;background:#378ADD;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 16px}
.login-title{font-size:20px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-error{background:#FCEBEB;color:#791F1F;font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:14px}
.sync-indicator{font-size:11px;color:#888;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media print{.header,.nav,.ai-panel,.no-print{display:none!important}.main{padding:0}}
</style>
</head>

var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var COLORS  = ["#378ADD","#1D9E75","#EF9F27","#D85A30","#7F77DD","#E24B4A","#639922","#D4537E"];
var EXP_CATS = ["Raw Materials","Maintenance","Logistics","Overheads","Electricity","Labor Wages"];

function ETB(n) { return "ETB " + new Intl.NumberFormat("en").format(Math.round(n)); }
function fmt(n) { return new Intl.NumberFormat("en").format(Math.round(n)); }
function today() { return new Date().toISOString().slice(0,10); }
function badge(s) {
  var map = {Paid:'paid',Partial:'partial',Unpaid:'unpaid',Production:'production',Transfer:'transfer',Dispatch:'dispatch','Opening Stock':'opening',Adjustment:'adjustment'};
  return '<span class="badge badge-'+(map[s]||'blue')+'">'+s+'</span>';
}
var avColors = [{bg:"#B5D4F4",tc:"#0C447C"},{bg:"#9FE1CB",tc:"#085041"},{bg:"#F5C4B3",tc:"#712B13"},{bg:"#C0DD97",tc:"#27500A"},{bg:"#CECBF6",tc:"#3C3489"},{bg:"#FAC775",tc:"#633806"}];
function initials(name, size, bg, tc) {
  size=size||36; bg=bg||"#B5D4F4"; tc=tc||"#0C447C";
  var ini=name.split(" ").map(function(w){return w[0];}).slice(0,2).join("");
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+bg+';color:'+tc+';font-size:'+Math.floor(size*.33)+'px">'+ini+'</div>';
}

var toastTimer;
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.opacity=1;clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.style.opacity=0;},2500);}
function setSyncing(state){var dot=document.getElementById('sync-dot');var lbl=document.getElementById('sync-label');if(!dot)return;dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');lbl.textContent=state==='syncing'?'Saving...':state==='error'?'Offline':'Connected';}

var DB = {products:[],clients:[],orders:[],orderLines:[],movements:[],expenses:[]};

async function loadAll() {
  setSyncing('syncing');
  try {
    var results = await Promise.all([
      sb.from('products').select('*').order('product_id'),
      sb.from('clients').select('*').order('client_id'),
      sb.from('orders').select('*').order('date',{ascending:false}),
      sb.from('order_lines').select('*'),
      sb.from('inventory_movements').select('*').order('date',{ascending:false}),
      sb.from('expenses').select('*').order('date',{ascending:false})
    ]);
    DB.products=results[0].data||[]; DB.clients=results[1].data||[]; DB.orders=results[2].data||[];
    DB.orderLines=results[3].data||[]; DB.movements=results[4].data||[]; DB.expenses=results[5].data||[];
    setSyncing('ok');
  } catch(err){setSyncing('error');showToast('Could not connect to database');console.error(err);}
}

function calcStock(){
  var stock={};
  DB.products.forEach(function(p){stock[p.product_id]={main:0,sales:0};});
  DB.movements.forEach(function(m){
    if(!stock[m.product_id])stock[m.product_id]={main:0,sales:0};
    if(m.type==='Production') stock[m.product_id].main+=m.qty;
    else if(m.type==='Opening Stock'){if(m.shift===2)stock[m.product_id].sales+=m.qty;else stock[m.product_id].main+=m.qty;}
    else if(m.type==='Transfer'){stock[m.product_id].main-=m.qty;stock[m.product_id].sales+=m.qty;}
    else if(m.type==='Dispatch') stock[m.product_id].sales-=m.qty;
    else if(m.type==='Adjustment'){if(m.shift===2)stock[m.product_id].sales+=m.qty;else stock[m.product_id].main+=m.qty;}
  });
  return stock;
}

function nextId(prefix,arr,field){
  var nums=arr.map(function(r){var m=r[field]&&r[field].match(/\d+$/);return m?parseInt(m[0]):0;});
  return prefix+String(Math.max.apply(null,[0].concat(nums))+1).padStart(3,'0');
}

function barChart(data,keyX,keyY,color,h){
  h=h||160;var W=520,H=h,pT=10,pR=10,pB=28,pL=48;
  var vals=data.map(function(d){return d[keyY];});var maxV=Math.max.apply(null,vals.concat([1]));
  var gap=(W-pL-pR)/data.length;var bw=Math.max(4,Math.floor(gap*0.6));
  function ff(v){return v>=1e6?(v/1e6).toFixed(1)+"M":v>=1000?(v/1000).toFixed(0)+"K":v;}
  var bars=data.map(function(d,i){var bh=Math.max(2,Math.round(((d[keyY]||0)/maxV)*(H-pT-pB)));var x=pL+i*gap+gap/2-bw/2;return '<rect x="'+x+'" y="'+(H-pB-bh)+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+color+'"/><text x="'+(x+bw/2)+'" y="'+(H-pB+14)+'" text-anchor="middle" font-size="9" fill="#888">'+d[keyX]+'</text>';}).join('');
  var yL='';for(var i=0;i<=4;i++){var v=Math.round(maxV*(i/4));var y=H-pB-Math.round((v/maxV)*(H-pT-pB));yL+='<text x="'+(pL-5)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#aaa">'+ff(v)+'</text><line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#f0f0f0" stroke-width="1"/>';}
  return '<div class="bar-chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+h+'px">'+yL+bars+'</svg></div>';
}
function hBarChart(data,keyLabel,keyVal,h){
  h=h||180;var W=520,H=h,pT=5,pR=80,pB=5,pL=90;var maxV=Math.max.apply(null,data.map(function(d){return d[keyVal];}).concat([1]));var rowH=Math.floor((H-pT-pB)/Math.max(data.length,1));
  var rows=data.map(function(d,i){var bw=Math.round((d[keyVal]/maxV)*(W-pL-pR));var y=pT+i*rowH+rowH/2-7;var lbl=d[keyLabel].length>11?d[keyLabel].substring(0,11)+'...':d[keyLabel];return '<text x="'+(pL-5)+'" y="'+(y+11)+'" text-anchor="end" font-size="10" fill="#666">'+lbl+'</text><rect x="'+pL+'" y="'+y+'" width="'+Math.max(2,bw)+'" height="14" rx="3" fill="'+COLORS[i%COLORS.length]+'"/><text x="'+(pL+bw+5)+'" y="'+(y+11)+'" font-size="9" fill="#888">'+(d[keyVal]>=1000?(d[keyVal]/1000).toFixed(0)+'K':d[keyVal])+'</text>';}).join('');
  return '<div class="bar-chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+h+'px">'+rows+'</svg></div>';
}
function donutChart(data,size){
  size=size||120;var r=40,cx=size/2,cy=size/2;var total=data.reduce(function(s,d){return s+d.value;},0)||1;var offset=0;
  var paths=data.map(function(d){var pct=d.value/total,angle=pct*Math.PI*2;var x1=cx+r*Math.sin(offset),y1=cy-r*Math.cos(offset);offset+=angle;var x2=cx+r*Math.sin(offset),y2=cy-r*Math.cos(offset);if(pct>=.999)return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+d.color+'" stroke-width="18"/>';return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+(pct>.5?1:0)+' 1 '+x2+','+y2+' Z" fill="'+d.color+'"/>';}).join('');
  return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#eee" stroke-width="18"/>'+paths+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-18)+'" fill="white"/></svg>';
}

var views={};

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
views.dashboard=function(){
  var orders=DB.orders,orderLines=DB.orderLines,expenses=DB.expenses;
  var totalRev=orders.reduce(function(s,o){return s+parseFloat(o.order_total||0);},0);

    +'<div class="two-col"><div class="card"><span class="sec-label">Expense breakdown</span>'+(expByCat.length?'<div style="display:flex;align-items:center;gap:16px">'+donutChart(expByCat)+'<div style="flex:1">'+expByCat.map(function(x){return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:9px"><div style="width:9px;height:9px;border-radius:50%;background:'+x.color+';flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#888">'+x.name+'</div><strong style="font-size:12px">'+ETB(x.value)+'</strong></div>';}).join('')+'</div></div>':'<p class="text-muted fs12" style="padding:20px 0">No expenses yet.</p>')+'</div>'
    +'<div class="card"><div class="flex-between mb16"><span class="sec-label" style="margin:0">Recent orders</span><button class="btn-sm" onclick="navigate(\'sales\')">View all</button></div>'+recent.map(function(o){return '<div class="row"><div><div class="fw6 fs12">'+o.client_name+'</div><div class="fs11 text-muted">'+o.order_id+' - '+o.date+'</div></div><div style="display:flex;align-items:center;gap:8px"><strong class="fs12">'+ETB(o.order_total)+'</strong>'+badge(o.status)+'</div></div>';}).join('')+'</div></div>';

var salesTab='list',salesSearch='',salesFilter='All';
var orderLines_form=[{productId:'',qty:1,unitPrice:0,lineTotal:0}];
var orderClient='',orderDate=today(),orderAmtPaid='';
var editOrderId=null,editOrderAmtPaid='',editOrderDate='',deleteOrderConfirm=null;

function calcOrderTotal(){return orderLines_form.reduce(function(s,l){return s+(l.lineTotal||0);},0);}
function calcBalanceDue(){return Math.max(0,calcOrderTotal()-(parseFloat(orderAmtPaid)||0));}

views.sales=function(){

  if(salesTab==='new'){
    var ot=calcOrderTotal(),bd=calcBalanceDue();
    html+='<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:16px">New sales order</h3>'
      +'<div class="two-col mb16"><div><label class="form-label">Client</label><select onchange="orderClient=this.value"><option value="">Select client...</option>'+clients.map(function(c){return '<option value="'+c.client_id+'"'+(orderClient===c.client_id?' selected':'')+'>'+c.name+' ('+c.client_id+')</option>';}).join('')+'</select></div><div><label class="form-label">Date</label><input type="date" value="'+orderDate+'" onchange="orderDate=this.value"></div></div>'
      +'<span class="sec-label">Order lines</span><div style="background:#f5f5f5;border-radius:8px;padding:12px;margin-bottom:12px">'
      +'<div style="display:grid;grid-template-columns:2fr 80px 120px 120px 30px;gap:8px;margin-bottom:8px;font-size:10px;color:#888;font-weight:700;text-transform:uppercase"><div>Product</div><div>Qty</div><div>Unit price</div><div>Line total</div><div></div></div>'
      +orderLines_form.map(function(l,i){return '<div style="display:grid;grid-template-columns:2fr 80px 120px 120px 30px;gap:8px;margin-bottom:8px;align-items:center"><select onchange="updateOrderLine('+i+',\'productId\',this.value)"><option value="">Select...</option>'+products.map(function(p){return '<option value="'+p.product_id+'"'+(l.productId===p.product_id?' selected':'')+'>'+p.name+'</option>';}).join('')+'</select><input type="number" min="1" value="'+l.qty+'" onchange="updateOrderLine('+i+',\'qty\',this.value)"><div style="padding:8px 0;font-size:13px;color:#888">'+(l.unitPrice?ETB(l.unitPrice):'--')+'</div><div style="padding:8px 0;font-size:13px;font-weight:600">'+(l.lineTotal?ETB(l.lineTotal):'--')+'</div><button class="btn-sm" onclick="removeOrderLine('+i+')" style="padding:4px 8px">X</button></div>';}).join('')
      +'<button class="btn-sm mt8" onclick="addOrderLine()">+ Add product</button></div>'
      +'<div style="text-align:right;margin-bottom:12px;font-size:13px;color:#888">Order total: <strong style="font-size:16px;color:#111">'+ETB(ot)+'</strong></div>'
      +'<div class="two-col mb16"><div><label class="form-label">Amount paid now (ETB)</label><input type="number" min="0" placeholder="0" value="'+orderAmtPaid+'" onchange="orderAmtPaid=this.value;renderMain()"></div><div style="background:#f5f5f5;border-radius:8px;padding:10px 14px"><div class="form-label">Balance due</div><strong style="font-size:18px;color:'+(bd>0?'#A32D2D':'#3B6D11')+'">'+ETB(bd)+'</strong></div></div>'
      +'<div class="info-box"><strong>Price protection</strong><p>Unit prices are locked at today\'s rates. Changing catalog prices later will NOT affect this order.</p></div>'
      +'<div class="flex-gap"><button class="btn-primary" onclick="submitOrder()">Save order</button><button class="btn-secondary" onclick="setSalesTab(\'list\')">Cancel</button></div></div>';
  } else {
    html+='<div class="search-row"><input placeholder="Search orders..." value="'+salesSearch+'" oninput="salesSearch=this.value;renderMain()">'+['All','Paid','Partial','Unpaid'].map(function(s){return '<button class="btn-sm'+(salesFilter===s?' btn-active':'')+'" onclick="salesFilter=\''+s+'\';renderMain()">'+s+'</button>';}).join('')+'</div>'
      +'<div class="info-box" style="margin-bottom:14px"><strong>Editing orders</strong><p>Click Edit on any order to correct the amount paid or date. To fix a completely wrong order, delete it and re-enter it. Note fields are shown on the order lines below the main table.</p></div>'
      +'<div class="card ovx"><table class="tbl"><thead><tr><th>Order</th><th>Date</th><th>Client</th><th>Items</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th style="min-width:100px">Actions</th></tr></thead><tbody>';
    filtered.forEach(function(o){
      var isEditing=(editOrderId===o.order_id);
      var isConfirmDelete=(deleteOrderConfirm===o.order_id);
      html+='<tr class="'+(isEditing?'editing-row':'')+'"><td class="fw6 color-blue fs12">'+o.order_id+'</td><td class="text-muted fs12">'+(isEditing?'<input type="date" value="'+editOrderDate+'" onchange="editOrderDate=this.value" style="width:120px;padding:4px 8px;font-size:12px">':o.date)+'</td><td class="fs12">'+o.client_name+'</td>'
        +'<td class="text-muted fs12">'+DB.orderLines.filter(function(l){return l.order_id===o.order_id;}).map(function(l){return l.product_name.split(' ')[0]+'x'+l.qty;}).join(', ')+'</td>'
        +'<td class="fw6 fs12">'+ETB(o.order_total)+'</td>'
        +'<td class="fs12 color-green">'+(isEditing?'<input type="number" min="0" value="'+editOrderAmtPaid+'" onchange="editOrderAmtPaid=this.value" style="width:110px;padding:4px 8px;font-size:12px">':ETB(o.amt_paid))+'</td>'
        +'<td class="fs12 fw6" style="color:'+(parseFloat(o.balance_due)>0?'#A32D2D':'#3B6D11')+'">'+ETB(o.balance_due)+'</td>'
        +'<td>'+badge(o.status)+'</td>'
        +'<td style="white-space:nowrap">';
      if(isEditing){
        html+='<button class="btn-edit" onclick="saveEditOrder(\''+o.order_id+'\','+o.order_total+')" style="margin-right:4px">Save</button>'

      } else {

          +'<button class="btn-danger" onclick="deleteOrderConfirm=\''+o.order_id+'\';renderMain()">Delete</button>';

    });

    html+='</tbody></table></div>';
  }
  return html;
};

function setSalesTab(t){salesTab=t;if(t==='new'){orderLines_form=[{productId:'',qty:1,unitPrice:0,lineTotal:0}];orderClient='';orderDate=today();orderAmtPaid='';editOrderId=null;deleteOrderConfirm=null;}renderMain();}
function updateOrderLine(i,field,val){if(field==='productId'){var p=DB.products.find(function(p){return p.product_id===val;});if(p){orderLines_form[i].productId=val;orderLines_form[i].productName=p.name;orderLines_form[i].unitPrice=p.price;}else{orderLines_form[i].productId='';orderLines_form[i].unitPrice=0;}}else if(field==='qty'){orderLines_form[i].qty=parseInt(val)||0;}orderLines_form[i].lineTotal=(orderLines_form[i].qty||0)*(orderLines_form[i].unitPrice||0);renderMain();}
function addOrderLine(){orderLines_form.push({productId:'',qty:1,unitPrice:0,lineTotal:0});renderMain();}
function removeOrderLine(i){if(orderLines_form.length>1){orderLines_form.splice(i,1);renderMain();}}

function startEditOrder(orderId,date,amtPaid){
  editOrderId=orderId; editOrderDate=date; editOrderAmtPaid=amtPaid; deleteOrderConfirm=null; renderMain();
}

async function saveEditOrder(orderId,orderTotal){
  var paid=parseFloat(editOrderAmtPaid)||0;
  var bal=Math.max(0,orderTotal-paid);
  var status=paid>=orderTotal?'Paid':paid>0?'Partial':'Unpaid';
  setSyncing('syncing');
  var result=await sb.from('orders').update({date:editOrderDate,amt_paid:paid,balance_due:bal,status:status}).eq('order_id',orderId);
  if(result.error){setSyncing('error');return showToast('Error saving: '+result.error.message);}
  editOrderId=null; showToast('Order updated!'); await loadAll(); renderMain();
}

async function confirmDeleteOrder(orderId){
  setSyncing('syncing');
  await sb.from('order_lines').delete().eq('order_id',orderId);
  var result=await sb.from('orders').delete().eq('order_id',orderId);
  if(result.error){setSyncing('error');return showToast('Error deleting: '+result.error.message);}
  deleteOrderConfirm=null; showToast('Order deleted.'); await loadAll(); renderMain();
}

async function submitOrder(){
  if(!orderClient)return showToast('Select a client');
  if(orderLines_form.some(function(l){return !l.productId||!l.qty;}))return showToast('Fill in all product lines');
  var client=DB.clients.find(function(c){return c.client_id===orderClient;});
  var newOrderId=nextId('O',DB.orders,'order_id');
  var paid=parseFloat(orderAmtPaid)||0,ot=calcOrderTotal();
  var status=paid>=ot?'Paid':paid>0?'Partial':'Unpaid';
  setSyncing('syncing');
  var r1=await sb.from('orders').insert({order_id:newOrderId,date:orderDate,client_id:orderClient,client_name:client.name,order_total:ot,amt_paid:paid,balance_due:Math.max(0,ot-paid),status:status});
  if(r1.error){setSyncing('error');return showToast('Error saving order: '+r1.error.message);}
  var lines=orderLines_form.filter(function(l){return l.productId;}).map(function(l){return {order_id:newOrderId,product_id:l.productId,product_name:l.productName,qty:l.qty,unit_price:l.unitPrice,line_total:l.lineTotal};});
  var r2=await sb.from('order_lines').insert(lines);
  if(r2.error){setSyncing('error');return showToast('Error saving lines: '+r2.error.message);}
  showToast('Order '+newOrderId+' saved!'); await loadAll(); setSalesTab('list');
}

          ?'<span class="fs11 color-red" style="margin-right:4px">Delete?</span><button class="btn-danger" onclick="confirmDeleteMovement(\''+m.movement_id+'\')" style="margin-right:4px">Yes</button><button class="btn-sm" onclick="deleteMovementConfirm=null;renderMain()">No</button>'
          :'<button class="btn-danger" onclick="deleteMovementConfirm=\''+m.movement_id+'\';renderMain()">Delete</button>';
        return '<tr><td class="text-muted fs11">'+m.movement_id+'</td><td class="text-muted fs12">'+m.date+'</td><td>'+badge(m.type)+'</td><td class="fs12">'+m.product_name+'</td><td class="fw6 fs12" style="color:'+qtyColor+'">'+(m.qty>0?'+':'')+fmt(m.qty)+'</td><td class="text-muted fs12">'+whLabel+'</td><td class="text-muted fs12">'+(m.note||'--')+'</td><td>'+actionCell+'</td></tr>';
      }).join('')
      +(filtered.length===0?'<tr><td colspan="8" style="text-align:center;padding:24px;color:#888">No movements yet.</td></tr>':'')
      +'</tbody></table></div>';
  }

};

async function submitMovement(){
  if(!moveProdId||moveQty==='')return showToast('Select a product and enter quantity');
  var qty=parseInt(moveQty);if(isNaN(qty))return showToast('Enter a valid number');
  if(moveType!=='Adjustment'&&qty<=0)return showToast('Quantity must be greater than 0');
  if(moveType==='Adjustment'&&qty===0)return showToast('Adjustment cannot be zero');
  var prod=DB.products.find(function(p){return p.product_id===moveProdId;});
  var stock=calcStock();var targetWh=(moveType==='Opening Stock'||moveType==='Adjustment')?parseInt(adjWarehouse):0;
  if(moveType==='Transfer'&&(stock[moveProdId]||{main:0}).main<qty)return showToast('Not enough units in Warehouse A');
  if(moveType==='Dispatch'&&(stock[moveProdId]||{sales:0}).sales<qty)return showToast('Not enough units in Warehouse B');
  if(moveType==='Adjustment'){var cur=targetWh===2?(stock[moveProdId]||{sales:0}).sales:(stock[moveProdId]||{main:0}).main;if(cur+qty<0)return showToast('Would result in negative stock. Current: '+fmt(cur));}
  var newId=nextId('M',DB.movements,'movement_id');
  var shiftVal=null;
  if(moveType==='Production')shiftVal=parseInt(moveShift);
  if(moveType==='Opening Stock'||moveType==='Adjustment')shiftVal=targetWh;
  setSyncing('syncing');
  var result=await sb.from('inventory_movements').insert({movement_id:newId,date:moveDate,type:moveType,product_id:moveProdId,product_name:prod.name,qty:qty,shift:shiftVal,note:moveNote||null});
  if(result.error){setSyncing('error');return showToast('Error: '+result.error.message);}
  showToast(newId+' saved');moveProdId='';moveQty='';moveNote='';
  await loadAll();renderMain();
}

async function confirmDeleteMovement(movementId){
  setSyncing('syncing');
  var result=await sb.from('inventory_movements').delete().eq('movement_id',movementId);
  if(result.error){setSyncing('error');return showToast('Error deleting: '+result.error.message);}
  deleteMovementConfirm=null;showToast('Movement deleted - stock recalculated.');await loadAll();renderMain();
}

var reportMode='monthly',reportMetric='units';
views['sales report']=function(){
  var orders=DB.orders,orderLines=DB.orderLines,products=DB.products;
  var isRev=reportMetric==='revenue',isQtr=reportMode==='quarterly';
  var colLabels=isQtr?['Q1','Q2','Q3','Q4']:MONTHS;
  function getVals(pid){return colLabels.map(function(_,i){var po=isQtr?orders.filter(function(o){return Math.floor(new Date(o.date).getMonth()/3)===i;}):orders.filter(function(o){return new Date(o.date).getMonth()===i;});return po.reduce(function(s,o){var lines=orderLines.filter(function(l){return l.order_id===o.order_id&&l.product_id===pid;});return s+lines.reduce(function(a,l){return a+(isRev?parseFloat(l.line_total||0):parseInt(l.qty||0));},0);},0);});}
  var rows=products.map(function(p){var vals=getVals(p.product_id);var rowTotal=vals.reduce(function(s,v){return s+v;},0);return Object.assign({},p,{vals:vals,rowTotal:rowTotal});}).filter(function(r){return r.rowTotal>0;});
  var colTotals=colLabels.map(function(_,i){return rows.reduce(function(s,r){return s+r.vals[i];},0);});
  var grandTotal=colTotals.reduce(function(s,v){return s+v;},0);
  var chartData=colLabels.map(function(l,i){return {label:l,val:colTotals[i]};});
  var topProdData=rows.slice().sort(function(a,b){return b.rowTotal-a.rowTotal;}).slice(0,6).map(function(r){return {name:r.name.replace(' Container','').replace('Liter ','L '),val:r.rowTotal};});
  return '<div class="flex-between mb16"><div class="section-header" style="margin:0"><h2>Sales Report</h2><p>Product breakdown by month and quarter</p></div><div class="flex-gap no-print"><button class="btn-green" onclick="downloadCSV()">Download CSV</button><button class="btn-secondary" onclick="window.print()">Print / Save PDF</button></div></div>'
    +'<div class="flex-gap mb16 no-print"><div class="flex-gap"><span class="text-muted fs12">Period:</span>'+['monthly','quarterly'].map(function(m){return '<button class="btn-secondary'+(reportMode===m?' btn-active':'')+'" onclick="reportMode=\''+m+'\';renderMain()">'+m.charAt(0).toUpperCase()+m.slice(1)+'</button>';}).join('')+'</div><div style="width:1px;height:20px;background:#e0e0e0"></div><div class="flex-gap"><span class="text-muted fs12">Metric:</span>'+['units','revenue'].map(function(m){return '<button class="btn-secondary'+(reportMetric===m?' btn-active':'')+'" onclick="reportMetric=\''+m+'\';renderMain()">'+m.charAt(0).toUpperCase()+m.slice(1)+'</button>';}).join('')+'</div></div>'
    +'<div class="two-col"><div class="card"><span class="sec-label">'+(isQtr?'Quarterly':'Monthly')+' '+(isRev?'revenue (ETB)':'units sold')+'</span>'+barChart(chartData,'label','val','#378ADD',150)+'</div><div class="card"><span class="sec-label">Top products</span>'+(topProdData.length?hBarChart(topProdData,'name','val',150):'<p class="text-muted fs12" style="padding:16px 0">No data yet.</p>')+'</div></div>'
    +'<div class="card ovx"><div class="flex-between mb16"><span class="sec-label" style="margin:0">'+(isQtr?'Quarterly':'Monthly')+' '+(isRev?'revenue':'units sold')+' - all products</span><span class="text-muted fs11">Grand total: <strong>'+(isRev?ETB(grandTotal):fmt(grandTotal)+' units')+'</strong></span></div>'
    +'<table class="report-tbl"><thead><tr><th style="text-align:left;min-width:140px">Product</th>'+colLabels.map(function(l){return '<th>'+l+'</th>';}).join('')+'<th>Total</th></tr></thead><tbody>'
    +rows.map(function(r){return '<tr><td>'+r.name+'</td>'+r.vals.map(function(v){return '<td>'+(isRev?ETB(v):fmt(v))+'</td>';}).join('')+'<td style="font-weight:700;color:#378ADD">'+(isRev?ETB(r.rowTotal):fmt(r.rowTotal))+'</td></tr>';}).join('')
    +'<tr class="total-row"><td>TOTAL</td>'+colTotals.map(function(v){return '<td>'+(isRev?ETB(v):fmt(v))+'</td>';}).join('')+'<td>'+(isRev?ETB(grandTotal):fmt(grandTotal))+'</td></tr></tbody></table></div>';
};

function downloadCSV(){
  var orders=DB.orders,orderLines=DB.orderLines,products=DB.products;
  var isRev=reportMetric==='revenue',isQtr=reportMode==='quarterly';
  var cols=isQtr?['Q1','Q2','Q3','Q4']:MONTHS;
  var csv='Product,'+cols.join(',')+',Total\n';
  products.forEach(function(p){var vals=cols.map(function(_,i){var po=isQtr?orders.filter(function(o){return Math.floor(new Date(o.date).getMonth()/3)===i;}):orders.filter(function(o){return new Date(o.date).getMonth()===i;});return po.reduce(function(s,o){var lines=orderLines.filter(function(l){return l.order_id===o.order_id&&l.product_id===p.product_id;});return s+lines.reduce(function(a,l){return a+(isRev?parseFloat(l.line_total||0):parseInt(l.qty||0));},0);},0);});var total=vals.reduce(function(s,v){return s+v;},0);if(total>0)csv+='"'+p.name+'",'+vals.join(',')+','+total+'\n';});
  var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gulele_sales_'+reportMode+'_'+reportMetric+'_'+today()+'.csv';a.click();showToast('CSV downloaded!');
}

var aiMessages=[{role:'assistant',content:'Hi Nathan! I can see all your live Supabase data - sales, inventory, expenses, and clients. What would you like to know?'}];
var aiInput='',aiLoading=false;
function renderAI(){var panel=document.getElementById('ai-panel');if(!panel||panel.style.display==='none')return;panel.innerHTML='<div style="padding:12px 16px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center"><div><strong style="font-size:13px">AI Assistant</strong><div style="font-size:10px;color:#888">Claude - Live Supabase data</div></div><button onclick="toggleAI()" style="background:none;border:none;font-size:20px;color:#888;cursor:pointer;line-height:1">x</button></div><div class="chat-messages" id="chat-messages">'+aiMessages.map(function(m){return '<div style="display:flex;justify-content:'+(m.role==='user'?'flex-end':'flex-start')+'"><div class="chat-bubble '+(m.role==='user'?'chat-user':'chat-bot')+'">'+m.content.replace(/\n/g,'<br>')+'</div></div>';}).join('')+(aiLoading?'<div style="display:flex"><div class="chat-bubble chat-bot">Thinking...</div></div>':'')+'</div><div class="chat-input-row"><input style="flex:1" placeholder="Ask about your business..." value="'+aiInput+'" onkeydown="if(event.key===\'Enter\')sendAI()" oninput="aiInput=this.value" id="ai-input"><button class="btn-primary" style="padding:8px 14px" onclick="sendAI()">Send</button></div>';var msgs=document.getElementById('chat-messages');if(msgs)msgs.scrollTop=msgs.scrollHeight;}
function buildAIContext(){var orders=DB.orders,expenses=DB.expenses,products=DB.products,clients=DB.clients;var stock=calcStock();var rev=orders.reduce(function(s,o){return s+parseFloat(o.order_total||0);},0);var out=orders.reduce(function(s,o){return s+parseFloat(o.balance_due||0);},0);var exp=expenses.reduce(function(s,x){return s+parseFloat(x.amount||0);},0);var pr={};DB.orderLines.forEach(function(l){pr[l.product_name]=(pr[l.product_name]||0)+parseFloat(l.line_total||0);});var top=Object.entries(pr).sort(function(a,b){return b[1]-a[1];}).slice(0,3).map(function(e){return e[0]+': ETB '+Math.round(e[1]).toLocaleString();}).join(', ');var bals=clients.map(function(c){var b=orders.filter(function(o){return o.client_id===c.client_id;}).reduce(function(s,o){return s+parseFloat(o.balance_due||0);},0);return b>0?c.name+': ETB '+Math.round(b).toLocaleString()+' owed':null;}).filter(Boolean).join('; ');var low=products.filter(function(p){return stock[p.product_id]&&stock[p.product_id].main<50;}).map(function(p){return p.name;}).join(', ');return 'You are the AI assistant for Gulele Factory, a plastic container manufacturer in Ethiopia. Owner: Nathan. All amounts in ETB.\nRevenue: ETB '+Math.round(rev).toLocaleString()+', Outstanding: ETB '+Math.round(out).toLocaleString()+', Expenses: ETB '+Math.round(exp).toLocaleString()+'.\nTop products: '+(top||'none yet')+'. Client balances: '+(bals||'none')+'. Low stock: '+(low||'none')+'.\nBe concise and actionable.';}
async function sendAI(){var el=document.getElementById('ai-input');var text=(el?el.value:aiInput).trim();if(!text||aiLoading)return;aiInput='';aiMessages.push({role:'user',content:text});aiLoading=true;renderAI();try{var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:buildAIContext(),messages:aiMessages.map(function(m){return {role:m.role,content:m.content};})})});var d=await res.json();aiMessages.push({role:'assistant',content:(d.content&&d.content[0]&&d.content[0].text)||'No response.'});}catch(e){aiMessages.push({role:'assistant',content:'Connection error.'});}aiLoading=false;renderAI();}
function toggleAI(){var p=document.getElementById('ai-panel');var btn=document.getElementById('ai-toggle');if(p.style.display==='none'){p.style.display='flex';p.style.flexDirection='column';btn.style.color='#378ADD';btn.style.borderColor='#378ADD';renderAI();}else{p.style.display='none';btn.style.color='';btn.style.borderColor='';}}

async function bootApp(){renderNav();document.getElementById('main').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#888;font-size:14px">Loading data from Supabase...</div>';await loadAll();renderMain();}
if(sessionStorage.getItem('gf_auth')==='1'){document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='block';bootApp();}
</script>
</body>
</html>
